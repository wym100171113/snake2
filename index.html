<!DOCTYPE html>
<html lang="zh-CN" class="theme-heal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFF4F0">
    <meta name="description" content="蛇来运转 · 一款治愈系网页贪吃蛇——360° 自由移动，36 种食物，9 款蛇皮肤，28 项成就，5 套主题风格，连击加分，道具商店，随时随地开箱即玩">
    <meta name="keywords" content="贪吃蛇, 网页游戏, 治愈, 休闲, HTML5, 手机, 电脑, 免费, 单机">
    <meta property="og:title" content="蛇来运转 · 治愈贪吃蛇">
    <meta property="og:description" content="360° 自由移动，36 种食物，9 款皮肤，28 项成就，5 套主题——一款让你停不下来的治愈系贪吃蛇">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
    <title>蛇来运转 · 治愈贪吃蛇 —— 360° 自由移动休闲小游戏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景装饰层 -->
    <div class="bg-blobs" aria-hidden="true">
        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="blob blob-3"></span>
    </div>
    <!-- 漂浮装饰粒子（纯 CSS 动画） -->
    <div class="bg-particles" aria-hidden="true">
        <span class="bg-particle" style="--x:10%;--d:8s;--s:1"></span>
        <span class="bg-particle" style="--x:25%;--d:12s;--s:0.7"></span>
        <span class="bg-particle" style="--x:40%;--d:10s;--s:1.2"></span>
        <span class="bg-particle" style="--x:55%;--d:14s;--s:0.6"></span>
        <span class="bg-particle" style="--x:70%;--d:9s;--s:1.1"></span>
        <span class="bg-particle" style="--x:85%;--d:11s;--s:0.8"></span>
        <span class="bg-particle" style="--x:95%;--d:13s;--s:0.9"></span>
    </div>

    <!-- 主菜单页 -->
    <section id="menu-screen" class="screen screen-menu" aria-label="主菜单">
        <div class="menu-card">
            <div class="menu-emoji" aria-hidden="true">🐍</div>
            <h1 class="menu-title">蛇来运转</h1>
            <p class="menu-slogan">一口一口，温柔吃掉坏心情</p>

            <div class="best-score-card">
                <span class="best-label">历史最高</span>
                <span class="best-value" id="menu-best">0</span>
                <span class="best-trophy" aria-hidden="true">🏆</span>
            </div>

            <div class="menu-stats" id="menu-stats">
                <div class="stat-item">
                    <span class="stat-num" id="stat-games">0</span>
                    <span class="stat-label">总局数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-score">0</span>
                    <span class="stat-label">积分</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-achievements">0</span>
                    <span class="stat-label">成就</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="stat-maxlen">0</span>
                    <span class="stat-label">最长</span>
                </div>
            </div>

            <button class="btn-primary" id="btn-start" type="button">
                <span>开始游戏</span>
                <span class="btn-arrow" aria-hidden="true">→</span>
            </button>

            <!-- 主题选择器 -->
            <div class="theme-selector">
                <span class="theme-label">主题风格</span>
                <div class="theme-options">
                    <button class="theme-btn active" data-theme="heal" title="治愈">🌸</button>
                    <button class="theme-btn" data-theme="dark" title="暗夜">🌙</button>
                    <button class="theme-btn" data-theme="forest" title="森林">🌿</button>
                    <button class="theme-btn" data-theme="ocean" title="海洋">🌊</button>
                    <button class="theme-btn" data-theme="candy" title="糖果">🍬</button>
                </div>
            </div>

            <!-- 蛇皮肤选择器 -->
            <div class="theme-selector">
                <span class="theme-label">蛇皮肤</span>
                <div class="skin-options" id="skin-options">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 道具携带选择 -->
            <div class="theme-selector">
                <span class="theme-label">🎒 携带道具</span>
                <div class="item-slots" id="item-slots">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 成就查看按钮 + 音效 + 技能商店 + 音乐 -->
            <div class="menu-row">
                <button class="btn-icon" id="btn-achievements" type="button" title="成就">
                    <span>🏆</span>
                </button>
                <button class="btn-icon" id="btn-shop" type="button" title="道具商店">
                    <span>🛒</span>
                </button>
                <button class="btn-icon" id="btn-sound" type="button" title="音效">
                    <span id="sound-icon">🔊</span>
                </button>
                <button class="btn-icon" id="btn-music" type="button" title="音乐">
                    <span id="music-icon">🎵</span>
                </button>
            </div>

            <div class="control-hints" id="control-hints">
                <div class="hint-card">
                    <span class="hint-icon" aria-hidden="true">🕹️</span>
                    <span class="hint-text">全方向虚拟遥感</span>
                </div>
                <div class="hint-card">
                    <span class="hint-icon" aria-hidden="true">⌨️</span>
                    <span class="hint-text">WASD / 方向键 8 向</span>
                </div>
                <div class="hint-card">
                    <span class="hint-icon" aria-hidden="true">🌸</span>
                    <span class="hint-text">36 种食物 · 连击 · 道具 · 皮肤</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 游戏页 -->
    <section id="game-screen" class="screen screen-game" aria-label="游戏中" hidden>
        <!-- 顶部 HUD -->
        <header class="hud">
            <div class="hud-pill">
                <span class="hud-label">得分</span>
                <span class="hud-value" id="hud-score">0</span>
            </div>
            <div class="hud-pill">
                <span class="hud-label">长度</span>
                <span class="hud-value" id="hud-length">3</span>
            </div>
            <div class="hud-pill hud-best">
                <span class="hud-label">最高</span>
                <span class="hud-value" id="hud-best">0</span>
            </div>
            <div class="hud-pill hud-time">
                <span class="hud-label">时间</span>
                <span class="hud-value" id="hud-time">0:00</span>
            </div>
            <button class="hud-btn" id="btn-pause" type="button" aria-label="暂停">
                <span aria-hidden="true">⏸</span>
            </button>
        </header>

        <!-- Buff 状态条 -->
        <div class="buff-bar" id="buff-bar" aria-live="polite"></div>

        <!-- 作弊模式提示 -->
        <div class="cheat-indicator" id="cheat-indicator" hidden>⚡ WYM 作弊模式</div>

        <!-- 游戏画布 -->
        <div class="canvas-wrap">
            <canvas id="game-canvas" aria-label="游戏画布"></canvas>
        </div>

        <!-- 游戏中道具按钮 -->
        <div class="game-item-btns">
            <button class="game-item-btn" id="item-btn-0" hidden type="button">
                <span class="game-item-icon"></span>
                <span class="game-item-count"></span>
                <span class="game-item-key"></span>
                <span class="game-item-cd"></span>
            </button>
            <button class="game-item-btn" id="item-btn-1" hidden type="button">
                <span class="game-item-icon"></span>
                <span class="game-item-count"></span>
                <span class="game-item-key"></span>
                <span class="game-item-cd"></span>
            </button>
        </div>

        <!-- 虚拟遥感（底部居中） -->
        <div class="joystick" id="joystick" aria-label="虚拟遥感">
            <div class="joystick-zone" id="joystick-zone">
                <div class="joystick-knob" id="joystick-knob"></div>
            </div>
        </div>
    </section>

    <!-- 成就 Toast -->
    <div class="achievement-toast" id="achievement-toast" hidden>
        <span class="ach-icon" id="ach-icon">🏆</span>
        <div class="ach-text">
            <span class="ach-title" id="ach-title"></span>
            <span class="ach-desc" id="ach-desc"></span>
        </div>
    </div>

    <!-- 暂停遮罩 -->
    <div class="overlay" id="pause-overlay" hidden>
        <div class="overlay-card">
            <div class="overlay-emoji" aria-hidden="true">☁️</div>
            <h2>休息一下</h2>
            <p>别着急，深呼吸再继续</p>
            <button class="btn-primary" id="btn-resume" type="button">继续游戏</button>
            <button class="btn-ghost" id="btn-pause-home" type="button">返回菜单</button>
        </div>
    </div>

    <!-- 结束弹窗 -->
    <div class="overlay" id="over-overlay" hidden>
        <div class="overlay-card overlay-result">
            <div class="overlay-emoji" id="over-emoji" aria-hidden="true">🌸</div>
            <h2 id="over-title">游戏结束</h2>
            <p class="over-sub" id="over-sub">这一局也很棒啦</p>
            <div class="result-grid">
                <div class="result-item">
                    <span class="result-label">本局得分</span>
                    <span class="result-value" id="over-score">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">蛇身长度</span>
                    <span class="result-value" id="over-length">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">存活时间</span>
                    <span class="result-value" id="over-time">0:00</span>
                </div>
                <div class="result-item">
                    <span class="result-label">历史最高</span>
                    <span class="result-value" id="over-best">0</span>
                </div>
            </div>
            <button class="btn-primary" id="btn-restart" type="button">再来一局</button>
            <button class="btn-ghost" id="btn-home" type="button">返回菜单</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <!-- 成就查看面板 -->
    <div class="overlay" id="achievement-panel" hidden>
        <div class="overlay-card overlay-ach">
            <div class="ach-panel-header">
                <h2 id="ach-panel-title">成就收藏</h2>
                <button class="hud-btn" id="btn-ach-close" type="button" aria-label="关闭">✕</button>
            </div>
            <div class="ach-panel-list" id="ach-list">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 技能商店面板 -->
    <div class="overlay" id="skill-shop-panel" hidden>
        <div class="overlay-card overlay-ach">
            <div class="ach-panel-header">
                <h2>道具商店 <span class="shop-score-label">💰<span id="shop-score">0</span></span></h2>
                <button class="hud-btn" id="btn-shop-close" type="button" aria-label="关闭">✕</button>
            </div>
            <p class="shop-hint">购买后点击主菜单"携带道具"选择，游戏中按 <kbd>Q</kbd>/<kbd>E</kbd> 或点击按钮使用</p>
            <div class="shop-list" id="shop-list">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
</body>
</html>
